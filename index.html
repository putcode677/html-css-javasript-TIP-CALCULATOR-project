<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tip calculator</title>
</head>
<body>
    <div class="container">
  <h1>Tip Calculator</h1>
  <h2>Calculator for bill calculations</h2>
  <div class="field">
    <label for="bill">Bill Amount</label>
    <input type="number" id="bill" placeholder="0.00" min="0" oninput="calculate()">
  </div>

         <div class="field">
    <label>Tip Percentage</label>
    <div class="tip-buttons">
      <button onclick="setTip(10, this)">10%</button>
      <button onclick="setTip(15, this)">15%</button>
      <button onclick="setTip(20, this)" class="active">20%</button>
      <button onclick="setTip(25, this)">25%</button>
    </div>
  </div>

  <div class="field">
    <label for="people">number of peoples</label>
    <input type="number" id="people" value="1" oninput="calculate()">
  </div>

   <div class="results">
    <div class="result-row">
      <span class="label">Tip Amount</span>
      <span class="value" id="tipAmount">0.00</span>
    </div>
     <div class="result-row">
      <span class="label">Total Bill</span>
      <span class="value" id="totalAmount">0.00</span>
    </div>
    </div>


   
</body>
</html>
